# 新能源/电池 - 赛道配置

track_id: "new_energy"
track_name: "新能源/电池"
category: "P1"
enabled: true

# 数据源配置
sources:
  - source_id: "github_trending"
    name: "GitHub Trending"
    type: "api"
    provider: "github"
    endpoint: "/search/repositories"
    enabled: true
    schedule: "0 9 * * *"
    params:
      q: "language:python created:>{date_7d}"
      sort: "stars"
      order: "desc"
      per_page: 25

  - source_id: "new_energy_arxiv"
    name: "arXiv 应用物理/能源"
    type: "api"
    provider: "arxiv"
    endpoint: "http://export.arxiv.org/api/query"
    enabled: true
    schedule: "0 8,20 * * *"
    params:
      search_query: "cat:physics.app-ph OR cat:cond-mat.mes-hall"
      max_results: 30
      sortBy: "submittedDate"
      sortOrder: "descending"

  - source_id: "36kr_tech"
    name: "36kr 科技新闻"
    type: "rss"
    provider: "36kr"
    endpoint: "https://36kr.com/feed"
    enabled: true
    schedule: "0 9,12,18 * * *"

# 检测规则
detection_rules:
  - rule_id: "star_surge"
    name: "Star数量异常增长"
    description: "7天内Star增长超过阈值"
    enabled: true
    metric: "stars_growth_7d"
    threshold:
      high: 0.5
      medium: 0.3
      low: 0.1
    filters:
      min_stars: 500
      min_stars_growth: 80

  - rule_id: "paper_burst"
    name: "论文激增"
    description: "新能源/电池相关论文突然增多"
    enabled: true
    threshold:
      high: 15
      medium: 8
    keywords:
      - "solid-state battery"
      - "sodium-ion battery"
      - "lithium-ion"
      - "energy storage"
      - "hydrogen fuel cell"
      - "EV battery"
      - "固态电池"
      - "钠离子电池"
      - "锂电池"
      - "储能"
      - "氢能"
      - "动力电池"
      - "电池材料"
      - "锂矿"
      - "固态电解质"

  - rule_id: "funding_news"
    name: "融资新闻"
    description: "新能源/电池融资事件"
    enabled: true
    keywords:
      - "固态电池"
      - "钠离子电池"
      - "储能融资"
      - "氢能"
      - "动力电池"
      - "新能源车"
      - "电池材料"
      - "锂矿"
      - "电动化"
    priority: "high"

# 关键词过滤
keywords:
  include:
    - "固态电池"
    - "钠离子电池"
    - "锂离子电池"
    - "储能"
    - "氢能"
    - "动力电池"
    - "新能源车"
    - "电池材料"
    - "锂矿"
    - "电动化"
    - "固态电解质"
    - "solid-state battery"
    - "sodium-ion battery"
    - "energy storage"
    - "hydrogen fuel cell"
    - "EV battery"
    - "CATL"
    - "比亚迪"
    - "宁德时代"
    - "亿纬锂能"
    - "中创新航"
  exclude:
    - "恶意"
    - "虚假"
    - "诈骗"

# 关联分析规则
correlation_rules:
  - rule_id: "policy_driven"
    trigger: "funding_news"
    meaning: "政策加码+资本加速，新能源赛道持续升温"
