# 脑机接口（BCI）- 赛道配置

track_id: "bci"
track_name: "脑机接口"
category: "P1"
enabled: true

# 数据源配置
sources:
  - source_id: "github_trending"
    name: "GitHub Trending"
    type: "api"
    provider: "github"
    endpoint: "/search/repositories"
    enabled: true
    schedule: "0 9 * * *"
    params:
      q: "language:python created:>{date_7d}"
      sort: "stars"
      order: "desc"
      per_page: 25

  - source_id: "bci_arxiv"
    name: "arXiv 神经工程/脑机接口"
    type: "api"
    provider: "arxiv"
    endpoint: "http://export.arxiv.org/api/query"
    enabled: true
    schedule: "0 8,20 * * *"
    params:
      search_query: "cat:cs.NE OR cat:q-bio.QM"
      max_results: 30
      sortBy: "submittedDate"
      sortOrder: "descending"

  - source_id: "36kr_tech"
    name: "36kr 科技新闻"
    type: "rss"
    provider: "36kr"
    endpoint: "https://36kr.com/feed"
    enabled: true
    schedule: "0 9,12,18 * * *"

# 检测规则
detection_rules:
  - rule_id: "star_surge"
    name: "Star数量异常增长"
    description: "7天内Star增长超过阈值"
    enabled: true
    metric: "stars_growth_7d"
    threshold:
      high: 0.5
      medium: 0.3
      low: 0.1
    filters:
      min_stars: 500
      min_stars_growth: 80

  - rule_id: "paper_burst"
    name: "论文激增"
    description: "脑机接口相关论文突然增多"
    enabled: true
    threshold:
      high: 10
      medium: 5
    keywords:
      - "brain-computer interface"
      - "BCI"
      - "neural interface"
      - "neural implant"
      - "BMI"
      - "脑机接口"
      - "神经接口"
      - "意念控制"
      - "Neuralink"
      - "Synchron"
      - "Paradromics"
      - "侵入式脑电"
      - "非侵入式BCI"
      - "皮层电位"
      - "运动想象"

  - rule_id: "funding_news"
    name: "融资新闻"
    description: "脑机接口融资事件"
    enabled: true
    keywords:
      - "脑机接口"
      - "神经接口"
      - "BCI融资"
      - "Neuralink"
      - "脑电"
      - "侵入式"
      - "具身智能"
    priority: "high"

# 关键词过滤
keywords:
  include:
    - "脑机接口"
    - "BCI"
    - "brain-computer interface"
    - "neural interface"
    - "neural implant"
    - "BMI"
    - "Neuralink"
    - "Synchron"
    - "Paradromics"
    - "意念控制"
    - "运动想象"
    - "皮层电位"
    - "脑电信号"
    - "神经调控"
    - "RNN"
    - "LSTM"
  exclude:
    - "恶意"
    - "虚假"
    - "诈骗"

# 关联分析规则
correlation_rules:
  - rule_id: "vc_entry"
    trigger: "funding_news"
    meaning: "VC入场标志行业进入快速发展期"
